services:
  - type: web
    name: sakhi-backend
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level warning
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: sakhi
      - key: GROK_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-3-latest
      - key: GROK_TIMEOUT_SECONDS
        value: "15.0"
      - key: GROK_MAX_TOKENS
        value: "512"
      - key: DEFAULT_CYCLE_LENGTH_DAYS
        value: "28"
    autoDeploy: true
